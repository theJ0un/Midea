name: Surveillance stock PortaSplit

on:
  # Déclenché uniquement à la demande (par cron-job.org toutes les 20 minutes).
  workflow_dispatch:

# Empêche deux exécutions de tourner en même temps (évite les conflits de sauvegarde)
concurrency:
  group: portasplit-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Lancer la vérification de stock
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python main.py

      - name: Sauvegarder l'état (state.json et monitor.log) dans le dépôt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json monitor.log 2>/dev/null || true
          if ! git diff --quiet --cached; then
            git commit -m "Mise à jour de l'état de surveillance [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "Rien à sauvegarder."
          fi
